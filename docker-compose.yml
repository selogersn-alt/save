version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: telechargeur-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telechargeur
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: telechargeur-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: telechargeur-api
    ports:
      - "13001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/telechargeur
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      - postgres
      - redis
    restart: always

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: telechargeur-worker
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/telechargeur
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      - postgres
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: telechargeur-frontend
    ports:
      - "13000:3000"
    environment:
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=https://save.digitalh.net
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  redis_data:
